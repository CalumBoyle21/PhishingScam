<!DOCTYPE html>
<html>
<head>
  <title>Secure Account Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
      width: 300px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0073e6;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #005bb5;
    }

    .hidden {
      display: none;
      margin-top: 15px;
      color: red;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Account Security Check</h2>
  <p style="font-size:12px;color:gray;">
    Urgent action required to prevent suspension.
  </p>

  <input type="text" placeholder="Email address">
  <input type="password" placeholder="Password">

  <button onclick="showMessage()">Login</button>

  <div id="message" class="hidden">
    ⚠️ This was a phishing awareness simulation.<br>
    Never enter credentials on suspicious websites.
  </div>
</div>

<script>
  function showMessage() {
    document.getElementById("message").classList.remove("hidden");
  }
</script>

</body>
</html>
